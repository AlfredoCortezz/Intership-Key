# ============================================================
# PERFIL DE PRODUCCIÓN / AZURE (por defecto)
# Las variables de entorno son inyectadas por Azure App Service
# ============================================================

spring.application.name=portal-backend

# Activar perfil: deja vacío para producción, o usa "dev" para local
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# --- DataSource (Azure PostgreSQL) ---
spring.datasource.url=${AZURE_DATABASE_URL:jdbc:postgresql://localhost:5432/keyportal}
spring.datasource.username=${AZURE_DATABASE_USER:postgres}
spring.datasource.password=${AZURE_DATABASE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=${PORT:8080}

# --- CORS Origins (configurado en CorsConfig.java) ---
# En Azure: define ALLOWED_ORIGINS=https://tu-app.vercel.app,https://tu-app.azurestaticapps.net
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
