# ============================================================
# PERFIL DE DESARROLLO LOCAL (H2 en memoria)
# Activar con: -Dspring.profiles.active=dev
# O definiendo SPRING_PROFILES_ACTIVE=dev
# ============================================================

# --- DataSource H2 ---
spring.datasource.url=jdbc:h2:mem:keyportaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console (accesible en http://localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- CORS local ---
app.cors.allowed-origins=http://localhost:3000
